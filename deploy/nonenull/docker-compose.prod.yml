services:
  api:
    build:
      context: ./server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://ntodo:${POSTGRES_PASSWORD}@postgres:5432/ntodo
      CORS_ORIGINS: https://account.nonenull.top,https://ntodo.nonenull.top,https://www.nonenull.top
      DOWNLOAD_ROOT: /downloads
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ${NONENULL_ROOT:-/root/srv/nonenull}/downloads:/downloads:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ntodo
      POSTGRES_USER: ntodo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ntodo -d ntodo"]
      interval: 10s
      timeout: 5s
      retries: 5
