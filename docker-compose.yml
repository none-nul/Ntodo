services:
  api:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://ntodo:${POSTGRES_PASSWORD:-ntodo_password}@postgres:5432/ntodo
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-verify@nonenull.top}
      SMTP_TIMEOUT_MS: ${SMTP_TIMEOUT_MS:-10000}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}
      REGISTER_CODE_TTL_MINUTES: ${REGISTER_CODE_TTL_MINUTES:-10}
      REGISTER_CODE_MAX_ATTEMPTS: ${REGISTER_CODE_MAX_ATTEMPTS:-5}
      REGISTER_CODE_EMAIL_COOLDOWN_MS: ${REGISTER_CODE_EMAIL_COOLDOWN_MS:-60000}
      REGISTER_CODE_EMAIL_HOURLY_MAX: ${REGISTER_CODE_EMAIL_HOURLY_MAX:-5}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ntodo
      POSTGRES_USER: ntodo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ntodo_password}
    volumes:
      - ntodo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ntodo -d ntodo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ntodo_postgres_data:
