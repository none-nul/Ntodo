services:
  api:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://ntodo:${POSTGRES_PASSWORD:-ntodo_password}@postgres:5432/ntodo
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ntodo
      POSTGRES_USER: ntodo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ntodo_password}
    volumes:
      - ntodo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ntodo -d ntodo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ntodo_postgres_data:
