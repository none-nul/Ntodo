<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ntodo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="titlebar">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <h1>Ntodo</h1>
            <p id="todayText"></p>
          </div>
        </div>
        <div class="window-actions">
          <button id="pinButton" class="icon-button active" title="始终置顶" aria-label="始终置顶">
            <svg class="title-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 4h6M10 4l1 6-3 3h8l-3-3 1-6"></path>
              <path d="M12 13v6"></path>
            </svg>
          </button>
          <button id="settingsButton" class="icon-button" title="设置" aria-label="设置">
            <svg class="title-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 8.8a3.2 3.2 0 1 0 0 6.4 3.2 3.2 0 0 0 0-6.4Z"></path>
              <path d="M13.8 3.8h-3.6l-.5 2.1c-.5.2-1 .5-1.5.9l-2.1-.7-1.8 3.1 1.6 1.5a6.8 6.8 0 0 0 0 1.8l-1.6 1.5 1.8 3.1 2.1-.7c.5.4 1 .7 1.5.9l.5 2.1h3.6l.5-2.1c.5-.2 1-.5 1.5-.9l2.1.7 1.8-3.1-1.6-1.5a6.8 6.8 0 0 0 0-1.8l1.6-1.5-1.8-3.1-2.1.7c-.5-.4-1-.7-1.5-.9l-.5-2.1Z"></path>
            </svg>
          </button>
          <button id="minButton" class="icon-button" title="最小化" aria-label="最小化">-</button>
          <button id="closeButton" class="icon-button danger" title="关闭" aria-label="关闭">x</button>
        </div>
      </header>

      <form id="quickAddForm" class="quick-add">
        <div class="add-mode-switch" aria-label="添加模式">
          <button class="add-mode-option active" type="button" data-mode="manual">手动</button>
          <button class="add-mode-option" type="button" data-mode="ai">AI</button>
        </div>
        <textarea id="taskInput" placeholder="添加现在要做的事" maxlength="260" rows="1"></textarea>
        <div class="manual-controls">
          <input id="dueDateInput" class="due-date-input" type="date" title="截止时间" />
          <div class="priority-picker" aria-label="优先级">
            <button class="priority-option high active" type="button" data-priority="3">高</button>
            <button class="priority-option medium" type="button" data-priority="2">中</button>
            <button class="priority-option low" type="button" data-priority="1">低</button>
          </div>
          <button id="addTaskButton" class="primary-button" type="submit">添加</button>
        </div>
        <div class="ai-controls" hidden>
          <button id="aiAddButton" class="ai-button" type="button">解析并添加</button>
        </div>
      </form>

      <section class="toolbar">
        <div class="tabs" role="tablist">
          <button class="tab active" type="button" data-view="active">待完成</button>
          <button class="tab" type="button" data-view="completed">已完成</button>
        </div>
      </section>

      <section id="encourage" class="encourage" hidden></section>
      <section id="aiError" class="ai-error" hidden></section>

      <section id="activeView" class="task-list"></section>
      <section id="completedView" class="task-list completed-list" hidden></section>
    </main>

    <section id="onboarding" class="onboarding" hidden>
      <div class="guide-card">
        <div class="guide-kicker">第一次使用</div>
        <h2>把它放在右上角，别让任务占满注意力。</h2>
        <p>添加任务、选择优先级。高优先级会自动排在前面；点任务右侧加号可以添加子项目；完成后会进入已完成记录。</p>
        <button id="guideDoneButton" type="button">知道了</button>
      </div>
    </section>

    <section id="settingsPanel" class="settings-panel" hidden>
      <div class="settings-card">
        <header class="settings-head">
          <div>
            <div class="guide-kicker">设置</div>
            <h2>Ntodo 偏好</h2>
          </div>
          <button id="settingsCloseButton" class="icon-button" title="关闭设置" aria-label="关闭设置">x</button>
        </header>

        <div class="settings-layout">
          <nav class="settings-menu" aria-label="设置分类">
            <button class="settings-menu-item active" type="button" data-settings-section="general">通用</button>
            <button class="settings-menu-item" type="button" data-settings-section="tasks">任务</button>
            <button class="settings-menu-item" type="button" data-settings-section="sync">同步</button>
            <button class="settings-menu-item" type="button" data-settings-section="ai">AI</button>
          </nav>

          <div class="settings-sections">
            <section class="settings-section active" data-settings-section="general">
              <label class="setting-row">
                <span>
                  <strong>开机自动启动</strong>
                  <small>安装版生效，开发模式可能受系统限制。</small>
                </span>
                <input id="openAtLoginToggle" type="checkbox" />
              </label>

              <label class="setting-column">
                <span>
                  <strong>远离不透明度</strong>
                  <small>光标完全不在附近时，窗口更淡并默认点击穿透。</small>
                </span>
                <div class="range-row">
                  <input id="farOpacityRange" type="range" min="22" max="80" step="2" />
                  <output id="farOpacityValue"></output>
                </div>
              </label>

              <label class="setting-column">
                <span>
                  <strong>靠近不透明度</strong>
                  <small>光标进入窗口范围但还没有操作时的透明程度。</small>
                </span>
                <div class="range-row">
                  <input id="nearOpacityRange" type="range" min="35" max="92" step="2" />
                  <output id="nearOpacityValue"></output>
                </div>
              </label>

              <label class="setting-column">
                <span>
                  <strong>操作不透明度</strong>
                  <small>点击控件进入操作状态后的清晰程度。</small>
                </span>
                <div class="range-row">
                  <input id="activeOpacityRange" type="range" min="65" max="98" step="2" />
                  <output id="activeOpacityValue"></output>
                </div>
              </label>
            </section>

            <section class="settings-section" data-settings-section="tasks">
              <label class="setting-row">
                <span>
                  <strong>子任务完成后完成主任务</strong>
                  <small>当一个任务的所有子项目都勾选完成时，自动把主任务移入已完成。</small>
                </span>
                <input id="autoCompleteParentToggle" type="checkbox" />
              </label>
            </section>

            <section class="settings-section" data-settings-section="sync">
              <div id="syncErrorBox" class="sync-error-box" hidden></div>

              <div id="syncAuthSwitch" class="sync-auth-switch">
                <button id="syncLoginModeButton" class="active" type="button">登录</button>
                <button id="syncRegisterModeButton" type="button">注册</button>
              </div>

              <div id="syncGuestFields" class="sync-auth-grid">
                <section id="syncLoginPanel" class="sync-auth-panel" aria-labelledby="syncLoginTitle">
                  <span class="sync-auth-title">
                    <strong id="syncLoginTitle">登录</strong>
                    <small>已有账号时，使用登录邮箱和密码。</small>
                  </span>

                  <label class="setting-column">
                    <span>
                      <strong>登录邮箱</strong>
                      <small>同一个账号可在多个设备登录。</small>
                    </span>
                    <input id="syncLoginEmailInput" class="setting-input" type="email" placeholder="you@example.com" autocomplete="username" />
                  </label>

                  <label class="setting-column">
                    <span>
                      <strong>密码</strong>
                      <small>登录密码。</small>
                    </span>
                    <input id="syncLoginPasswordInput" class="setting-input" type="password" placeholder="Password" autocomplete="current-password" />
                  </label>

                  <button id="syncLoginButton" type="button">登录</button>
                </section>

                <section id="syncRegisterPanel" class="sync-auth-panel" aria-labelledby="syncRegisterTitle" hidden>
                  <span class="sync-auth-title">
                    <strong id="syncRegisterTitle">注册</strong>
                    <small>先完成人机验证并发送邮箱验证码。</small>
                  </span>

                  <label class="setting-column">
                    <span>
                      <strong>注册邮箱</strong>
                      <small>验证码会发送到这个邮箱。</small>
                    </span>
                    <input id="syncRegisterEmailInput" class="setting-input" type="email" placeholder="you@example.com" autocomplete="email" />
                  </label>

                  <label class="setting-column">
                    <span>
                      <strong>密码</strong>
                      <small>至少 8 位。</small>
                    </span>
                    <input id="syncRegisterPasswordInput" class="setting-input" type="password" placeholder="Password" autocomplete="new-password" />
                  </label>

                  <label class="setting-column">
                    <span>
                      <strong>验证码</strong>
                      <small>邮箱验证通过后才会创建账号。</small>
                    </span>
                    <input id="syncCodeInput" class="setting-input" type="text" inputmode="numeric" maxlength="6" placeholder="6 位验证码" autocomplete="one-time-code" />
                  </label>

                  <div class="sync-turnstile">
                    <iframe id="syncTurnstileFrame" title="Ntodo human verification"></iframe>
                  </div>

                  <div class="sync-register-actions">
                    <button id="syncSendCodeButton" type="button">发送验证码</button>
                    <button id="syncRegisterButton" type="button">注册</button>
                  </div>
                </section>
              </div>

              <div id="syncAccountPanel" class="sync-account-panel" hidden>
                <span>
                  <strong id="syncAccountEmail"></strong>
                  <small id="syncAccountMeta"></small>
                </span>
              </div>

              <div class="sync-actions">
                <button id="syncNowButton" type="button">立即同步</button>
                <button id="syncLogoutButton" type="button" hidden>注销</button>
              </div>

              <small id="syncStatusText" class="setting-status"></small>
            </section>

            <section class="settings-section" data-settings-section="ai">
              <div class="api-manager">
                <div class="api-manager-head">
                  <span>
                    <strong>AI API</strong>
                    <small>保存后会折叠为配置列表，可新增、选择、编辑或删除。</small>
                  </span>
                  <button id="openaiAddConfigButton" class="small-button" type="button" title="添加 API" aria-label="添加 API">+</button>
                </div>

                <div id="openaiProfilesList" class="api-profile-list"></div>

                <div id="openaiEditor" class="api-editor" hidden>
                  <label class="setting-column">
                    <span>
                      <strong>API Key</strong>
                      <small>以密码形式显示，仅保存在本机配置里。</small>
                    </span>
                    <input id="openaiApiKeyInput" class="setting-input" type="password" placeholder="sk-..." autocomplete="off" />
                  </label>

                  <label class="setting-column">
                    <span>
                      <strong>Base URL</strong>
                      <small>接口根地址，例如 https://api.openai.com/v1。</small>
                    </span>
                    <input id="openaiBaseUrlInput" class="setting-input" type="url" placeholder="https://api.openai.com/v1" />
                  </label>

                  <label class="setting-column">
                    <span>
                      <strong>Model</strong>
                      <small>用于把自然语言解析成任务结构。</small>
                    </span>
                    <input id="openaiModelInput" class="setting-input" type="text" placeholder="gpt-4o-mini" />
                  </label>

                  <div class="api-editor-actions">
                    <button id="openaiTestButton" type="button">测试连接</button>
                    <button id="openaiSaveConfigButton" class="primary-button" type="button">保存 API</button>
                    <button id="openaiCancelEditButton" type="button">取消</button>
                  </div>
                  <small id="openaiTestStatus" class="setting-status"></small>
                </div>
              </div>

              <label class="setting-column">
                <span>
                  <strong>剪贴板 AI 快捷键</strong>
                  <small>复制文字后按此快捷键，会在鼠标位置生成可编辑确认框。</small>
                </span>
                <input id="clipboardShortcutInput" class="setting-input" type="text" placeholder="Ctrl+Alt+T" />
                <small id="clipboardShortcutStatus" class="setting-status"></small>
              </label>
            </section>
          </div>
        </div>
      </div>
    </section>

    <section id="closeChoicePanel" class="close-choice-panel" hidden>
      <div class="close-choice-card">
        <h2>关闭 Ntodo</h2>
        <p>选择缩小到托盘继续运行，或者完全退出程序。</p>
        <div class="close-choice-actions">
          <button id="closeToTrayButton" type="button">缩小到托盘</button>
          <button id="quitAppButton" class="danger-action" type="button">完全关闭</button>
          <button id="closeChoiceCancel" type="button">取消</button>
        </div>
      </div>
    </section>

    <template id="taskTemplate">
      <article class="task-item">
        <div class="task-row">
          <input class="task-check" type="checkbox" />
          <div class="task-main">
            <div class="task-title"></div>
            <div class="task-meta"></div>
            <div class="task-actions">
              <button class="small-button due-toggle" type="button" title="设置截止日期" aria-label="设置截止日期">
                <svg class="action-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="5" y="6" width="14" height="13" rx="3"></rect>
                  <path d="M8 4v4M16 4v4M5 10h14"></path>
                  <path d="M9 14h1M14 14h1"></path>
                </svg>
              </button>
              <button class="small-button subtask-toggle" type="button" title="添加子项目" aria-label="添加子项目">
                <svg class="action-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 6v12M6 12h12"></path>
                </svg>
              </button>
              <button class="small-button delete-task" type="button" title="删除任务" aria-label="删除任务">
                <svg class="action-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M7 8h10M10 8V6h4v2M9 10v7M15 10v7"></path>
                  <path d="M8 8l1 11h6l1-11"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
        <form class="due-date-form" hidden>
          <input type="date" title="截止时间" />
          <button type="submit">保存</button>
          <button class="clear-due" type="button" title="清除截止时间" aria-label="清除截止时间">x</button>
        </form>
        <form class="subtask-form" hidden>
          <input type="text" placeholder="添加子项目" maxlength="100" />
          <button type="submit">加入</button>
        </form>
        <div class="subtasks"></div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
